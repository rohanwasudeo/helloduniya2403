<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello Duniya Vite React Preview</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
      body {
        background: #f8fafc;
      }
      .hello-img {
        max-width: 300px;
        border-radius: 1rem;
        box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      }
      .footer-fixed {
        position: absolute;
        left: 0;
        bottom: 0;
        width: 100%;
        background: #fff;
        border-top: 1px solid #dee2e6;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="text/babel">
      function App() {
        return (
          <div className="container vh-100 d-flex flex-column justify-content-center align-items-center bg-light position-relative" style={{ minHeight: '100vh' }}>
            <div className="text-center animate__animated animate__fadeInDown">
              <h1 className="display-3 fw-bold mb-3">Hello Duniya</h1>
              <p className="lead mb-4">Welcome to your Vite + React project!</p>
              <img
                src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=400&q=80"
                alt="Hello Duniya"
                className="hello-img animate__animated animate__zoomIn"
              />
            </div>
            <footer className="w-100 text-center mt-auto py-3 bg-white border-top animate__animated animate__fadeInUp footer-fixed">
              <small className="text-muted">&copy; {new Date().getFullYear()} Hello Duniya Vite React</small>
            </footer>
          </div>
        );
      }
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
